
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Digital Prescription</title>

<style>
body { font-family: Arial; background:#e8f5e9; }

.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  padding:10px;
  margin:5px;
  background:green;
  color:white;
  border:none;
}

/* PRESCRIPTION PAD */
.pad {
  border:2px solid green;
  padding:20px;
  margin-top:20px;
  position:relative;
  background:#f0fdf4;
}

/* HEADER FIXED */
.header {
  display:flex;
  justify-content:space-between;
  border-bottom:2px solid green;
  padding-bottom:10px;
}

/* WATERMARK IMAGE */
.watermark {
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  width:200px;
  opacity:0.08;
}

/* FOOTER */
.footer {
  text-align:right;
  margin-top:20px;
  font-size:12px;
}

/* PRINT ONLY PAD */
@media print {
  body * { visibility:hidden; }
  #output, #output * { visibility:visible; }
  #output {
    position:absolute;
    top:0;
    left:0;
    width:100%;
  }
}
</style>

</head>

<body>

<div class="container">

<h2>Digital Prescription</h2>

<input id="name" placeholder="Patient Name">
<input id="age" placeholder="Age">
<input id="address" placeholder="Address">

<textarea id="cc" placeholder="Chief Complaint"></textarea>
<textarea id="dx" placeholder="Diagnosis"></textarea>
<textarea id="med" placeholder="Medicines"></textarea>
<textarea id="advice" placeholder="Advice"></textarea>

<button onclick="generate()">Generate</button>
<button onclick="window.print()">Print</button>
<button onclick="download()">Download</button>

<div id="output"></div>

</div>

<script>

function generate(){

let d = {
name:name.value,
age:age.value,
address:address.value,
cc:cc.value,
dx:dx.value,
med:med.value,
advice:advice.value,
date:new Date().toLocaleDateString()
};

output.innerHTML = `
<div class="pad">

<!-- WATERMARK -->
<img class="watermark" src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Dhanvantari.jpg/512px-Dhanvantari.jpg">

<!-- HEADER -->
<div class="header">
<div>
<b>Dr. Ashis Kumar Nath</b><br>
BAMS, Clinical Panchkarma Specialist
</div>
<div>
11AM – 5PM<br>Sunday Closed
</div>
</div>

<br>

<p><b>Name:</b> ${d.name}</p>
<p><b>Age:</b> ${d.age}</p>
<p><b>Date:</b> ${d.date}</p>
<p><b>Address:</b> ${d.address}</p>

<hr>

<p><b>Chief Complaint:</b><br>${d.cc}</p>
<p><b>Diagnosis:</b><br>${d.dx}</p>
<p><b>Medicines:</b><br>${d.med}</p>
<p><b>Advice:</b><br>${d.advice}</p>

<div class="footer">
Not for Medical Legal Purpose
</div>

</div>
`;
}

/* DOWNLOAD FUNCTION */
function download(){
let content = document.getElementById("output").innerHTML;
let blob = new Blob([content], {type:"text/html"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "prescription.html";
a.click();
}

</script>

</body>
</html>
