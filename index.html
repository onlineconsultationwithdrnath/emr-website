
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Premium EMR</title>

<style>
body { font-family: Arial; background:#e8f5e9; }

.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  padding:10px;
  margin:5px;
  background:green;
  color:white;
  border:none;
}

.pad {
  border:3px solid green;
  padding:20px;
  margin-top:20px;
  position:relative;
}

/* Watermark */
.pad::before {
  content:"";
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%, -50%);
  width:200px;
  height:200px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Dhanvantari.jpg/200px-Dhanvantari.jpg') no-repeat center;
  background-size:contain;
  opacity:0.08;
}

/* PRINT ONLY PRESCRIPTION */
@media print {
  body * {
    visibility: hidden;
  }
  #output, #output * {
    visibility: visible;
  }
  #output {
    position:absolute;
    top:0;
    left:0;
    width:100%;
  }
}
</style>

</head>

<body>

<div class="container">

<h2>Digital Prescription</h2>

<input id="name" placeholder="Patient Name">
<input id="age" placeholder="Age">
<input id="address" placeholder="Address">

<textarea id="cc" placeholder="Chief Complaint"></textarea>
<textarea id="dx" placeholder="Diagnosis"></textarea>
<textarea id="med" placeholder="Medicines"></textarea>
<textarea id="advice" placeholder="Advice"></textarea>

<button onclick="generate()">Generate</button>
<button onclick="window.print()">Print</button>

<div id="output"></div>

</div>

<script>

function generate(){

let d = {
name:name.value,
age:age.value,
address:address.value,
cc:cc.value,
dx:dx.value,
med:med.value,
advice:advice.value,
date:new Date().toLocaleDateString()
};

output.innerHTML = `
<div class="pad">

<div style="display:flex; justify-content:space-between;">
<div>
<b>Dr. Ashis Kumar Nath</b><br>
BAMS, Clinical Panchkarma Specialist
</div>
<div>
Timing: 11AM - 5PM<br>
Sunday Closed
</div>
</div>

<hr>

<p><b>Name:</b> ${d.name}</p>
<p><b>Age:</b> ${d.age}</p>
<p><b>Date:</b> ${d.date}</p>
<p><b>Address:</b> ${d.address}</p>

<hr>

<p><b>Chief Complaint:</b> ${d.cc}</p>
<p><b>Diagnosis:</b> ${d.dx}</p>
<p><b>Medicines:</b> ${d.med}</p>
<p><b>Advice:</b> ${d.advice}</p>

<br>

<p style="text-align:center;font-size:12px;">
Not for Medical Legal Purpose
</p>

</div>
`;

}

</script>

</body>
</html>
