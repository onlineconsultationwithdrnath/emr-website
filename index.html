
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Premium EMR</title>

<style>
body { font-family: Arial; background:#e8f5e9; }

/* LOGIN */
.login {
  max-width:300px;
  margin:auto;
  margin-top:100px;
  background:white;
  padding:20px;
  text-align:center;
}

/* MAIN */
.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
}

/* INPUT */
input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  padding:10px;
  margin:5px;
  background:green;
  color:white;
  border:none;
}

/* PRESCRIPTION PAD */
.pad {
  border:3px solid green;
  padding:20px;
  margin-top:20px;
  position:relative;
}

/* WATERMARK */
.pad::before {
  content:"";
  position:absolute;
  top:35%;
  left:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:200px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Dhanvantari.jpg/200px-Dhanvantari.jpg') no-repeat center;
  background-size:contain;
  opacity:0.07;
}

/* PRINT */
@media print {
  body * { visibility:hidden; }
  #output, #output * { visibility:visible; }
  #output { position:absolute; top:0; left:0; width:100%; }
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
<h3>Doctor Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="mainPage" style="display:none">

<div class="container">

<h2>Digital EMR</h2>

<input id="name" placeholder="Patient Name">
<input id="age" placeholder="Age">
<input id="address" placeholder="Address">

<textarea id="cc" placeholder="Chief Complaint"></textarea>
<textarea id="dx" placeholder="Diagnosis"></textarea>
<textarea id="med" placeholder="Medicines"></textarea>
<textarea id="advice" placeholder="Advice"></textarea>

<button onclick="generate()">Generate</button>
<button onclick="window.print()">Print</button>

<input id="search" placeholder="Search Patient" onkeyup="searchData()">

<h3>History</h3>
<div id="history"></div>

<div id="output"></div>

</div>
</div>

<script>

// LOGIN
function login(){
if(user.value=="admin" && pass.value=="1234"){
loginPage.style.display="none";
mainPage.style.display="block";
loadHistory();
}else{
alert("Wrong login");
}
}

// GENERATE
function generate(){

let d = {
name:name.value,
age:age.value,
address:address.value,
cc:cc.value,
dx:dx.value,
med:med.value,
advice:advice.value,
date:new Date().toLocaleDateString()
};

// OUTPUT = PRESCRIPTION PAD FORMAT
output.innerHTML = `
<div class="pad">

<div style="display:flex; justify-content:space-between;">
<div>
<b>Dr. Ashis Kumar Nath</b><br>
BAMS, Clinical Panchkarma Specialist
</div>
<div>
Timing: 11AM - 5PM<br>
Sunday Closed
</div>
</div>

<hr>

<p><b>Name:</b> ${d.name}</p>
<p><b>Age:</b> ${d.age}</p>
<p><b>Date:</b> ${d.date}</p>
<p><b>Address:</b> ${d.address}</p>

<hr>

<p><b>Chief Complaint:</b> ${d.cc}</p>
<p><b>Diagnosis:</b> ${d.dx}</p>
<p><b>Medicines:</b> ${d.med}</p>
<p><b>Advice:</b> ${d.advice}</p>

<br>

<p style="text-align:center;font-size:12px;">
Not for Medical Legal Purpose
</p>

</div>
`;

saveHistory(d);
}

// SAVE
function saveHistory(d){
let arr = JSON.parse(localStorage.getItem("patients") || "[]");
arr.push(d);
localStorage.setItem("patients", JSON.stringify(arr));
loadHistory();
}

// LOAD
function loadHistory(){
let arr = JSON.parse(localStorage.getItem("patients") || "[]");
history.innerHTML="";
arr.forEach(p=>{
history.innerHTML += `<p>${p.name} (${p.date})</p>`;
});
}

// SEARCH
function searchData(){
let val = search.value.toLowerCase();
let arr = JSON.parse(localStorage.getItem("patients") || "[]");
history.innerHTML="";
arr.filter(p=>p.name.toLowerCase().includes(val))
.forEach(p=>{
history.innerHTML += `<p>${p.name} (${p.date})</p>`;
});
}

</script>

</body>
</html>
