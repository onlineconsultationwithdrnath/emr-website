<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Digital Prescription</title>

<style>
body { font-family: Arial; background:#e8f5e9; }

/* LOGIN */
.login {
  max-width:300px;
  margin:auto;
  margin-top:100px;
  background:white;
  padding:20px;
  text-align:center;
}

/* MAIN */
.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
}

/* INPUT */
input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  padding:10px;
  margin:5px;
  background:green;
  color:white;
  border:none;
}

/* PAD DESIGN */
.pad {
  border:3px solid #166534;
  padding:25px;
  margin-top:20px;
  background:#f0fdf4;
  position:relative;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  border-bottom:2px solid green;
  padding-bottom:10px;
}

/* FOOTER */
.footer {
  display:flex;
  justify-content:space-between;
  margin-top:30px;
  font-size:12px;
}

/* PRINT ONLY PAD */
@media print {
  body * { visibility:hidden; }
  #output, #output * { visibility:visible; }
  #output {
    position:absolute;
    top:0;
    left:0;
    width:100%;
  }
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
<h3>Doctor Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="mainPage" style="display:none">

<div class="container">

<h2>Digital EMR</h2>

<input id="name" placeholder="Patient Name">
<input id="age" placeholder="Age">
<input id="address" placeholder="Address">

<textarea id="cc" placeholder="Chief Complaint"></textarea>
<textarea id="dx" placeholder="Diagnosis"></textarea>
<textarea id="med" placeholder="Medicines"></textarea>
<textarea id="advice" placeholder="Advice"></textarea>

<button onclick="generate()">Generate</button>
<button onclick="window.print()">Print</button>

<div id="output"></div>

</div>
</div>

<script>

// LOGIN
function login(){
if(user.value=="admin" && pass.value=="1234"){
loginPage.style.display="none";
mainPage.style.display="block";
}else{
alert("Wrong login");
}
}

// GENERATE PRESCRIPTION
function generate(){

let d = {
name:name.value,
age:age.value,
address:address.value,
cc:cc.value,
dx:dx.value,
med:med.value,
advice:advice.value,
date:new Date().toLocaleDateString()
};

output.innerHTML = `
<div class="pad">

<!-- WATERMARK -->
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Dhanvantari.jpg/512px-Dhanvantari.jpg"
style="
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
width:220px;
opacity:0.06;
">

<!-- CONTENT -->
<div style="position:relative;">

<div class="header">
  <div>
    <b>Dr. Ashis Kumar Nath</b><br>
    BAMS, Clinical Panchkarma Specialist
  </div>
  <div style="text-align:right;">
    Timing: 11 AM – 5 PM<br>
    Sunday Closed
  </div>
</div>

<br>

<p><b>Name:</b> ${d.name}</p>
<p><b>Age:</b> ${d.age}</p>
<p><b>Date:</b> ${d.date}</p>
<p><b>Address:</b> ${d.address}</p>

<hr>

<p><b>Chief Complaint:</b><br>${d.cc}</p>
<p><b>Diagnosis:</b><br>${d.dx}</p>
<p><b>Medicines:</b><br>${d.med}</p>
<p><b>Advice:</b><br>${d.advice}</p>

<div class="footer">
  <div></div>
  <div>Not for Medical Legal Purpose</div>
</div>

</div>
</div>
`;
}

</script>

</body>
</html>
